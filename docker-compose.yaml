version: "3.9"

services:

  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: aigis
      POSTGRES_PASSWORD: aigis
      POSTGRES_DB: aigis
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: aigis-backend
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    command: celery -A workers.celery_app.celery worker --loglevel=info
    depends_on:
      - backend
      - redis

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"